<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>

    <style>
        @font-face {
            font-family:'linda' ;
            src: url('adelia.otf') format('opentype'), url(adelia.ttf)
            format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        body{font-family: Arial, Helvetica, sans-serif;}

        h1{font-family: 'linda', Times, serif;
        font-size: 3em;}
    </style>
</head>
<body>
    <h1>Titulo</h1>
    <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Voluptatem dicta perspiciatis totam excepturi vel commodi ea nulla quas illum tenetur? Saepe vero ipsam nobis quas, id excepturi quis ut expedita!</p>
</body>
</html>
